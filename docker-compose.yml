version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: ayurdiet-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ayurvedic_diet

  backend:
    build: ./backend
    container_name: ayurdiet-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/ayurvedic_diet
      JWT_SECRET: your_jwt_secret_change_in_production
      NODE_ENV: production
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: ayurdiet-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
